<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#f0d080;
  --z50:#fafafa;--z100:#f4f4f5;--z200:#e4e4e7;--z400:#a1a1aa;--z500:#71717a;--z700:#3f3f46;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;--orange:#fb923c;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#030305;color:#fff;display:flex;flex-direction:column}

/* AURORA BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%}
50%{opacity:.7;transform:scale(1)}}

/* LAYOUT */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
.app-header{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-family:'Syne',sans-serif;font-weight:900;font-size:18px}
.main-content{flex:1;overflow-y:auto;padding:8px 14px 90px;-webkit-overflow-scrolling:touch}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(3,3,5,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:10px 4px 16px;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:6px 10px;border-radius:14px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.35);transition:all .2s;font-family:'DM Sans',sans-serif}
.nav-btn.active{color:var(--gold);background:rgba(201,168,76,.12)}
.nav-btn svg{width:20px;height:20px}

/* GLASS */
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:22px}
.glass-gold{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:22px}

/* TYPOGRAPHY */
.page-title{font-family:'Syne',sans-serif;font-weight:900;font-size:clamp(24px,7vw,38px);margin-bottom:18px;background:linear-gradient(135deg,#fff 0%,var(--gold2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;margin-bottom:12px;color:rgba(255,255,255,.85)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--gold),#8a5a10);border-radius:26px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:rgba(255,255,255,.08);border-radius:50%}
.hero-label{font-size:11px;opacity:.75;margin-bottom:5px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.hero-value{font-family:'Syne',sans-serif;font-size:40px;font-weight:900;color:#fff;position:relative;z-index:1}

/* STAT CARDS */
.stat{padding:14px;border-radius:18px}
.stat-label{font-size:10px;color:rgba(255,255,255,.45);font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.mb4{margin-bottom:14px}
.mb6{margin-bottom:18px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700;white-space:nowrap}
.b-transit{background:#dbeafe;color:#1d4ed8}
.b-recu{background:#f3e8ff;color:#7e22ce}
.b-envoye{background:#ffedd5;color:#c2410c}
.b-attente{background:#fef9c3;color:#854d0e}
.b-paye{background:#dcfce7;color:#15803d}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.055)}
.row:last-child{border-bottom:none}
.row-name{font-weight:700;font-size:13px;font-family:'Syne',sans-serif;color:#fff;margin-bottom:3px}
.row-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.row-price{font-family:'Syne',sans-serif;font-weight:900;font-size:16px;color:var(--gold)}
.sale-info{font-size:10px;color:rgba(255,255,255,.45);margin-top:5px}
.sale-info span{display:block;margin-top:1px}

/* FORM */
.input{width:100%;border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:13px 15px;font-size:14px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.05);color:#fff;outline:none;transition:border-color .2s;-webkit-appearance:none}
.input::placeholder{color:rgba(255,255,255,.25)}
.input:focus{border-color:var(--gold)}
.input option{background:#111;color:#fff}
.btn{width:100%;background:linear-gradient(135deg,var(--gold),#8a5a10);color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-cancel{width:100%;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm{background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.55);border-radius:10px;padding:7px 10px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-red{background:rgba(248,113,113,.12);border:none;color:#f87171;border-radius:10px;padding:7px 10px;font-size:13px;cursor:pointer}
.sy>*+*{margin-top:11px}

/* TOGGLE */
.tog-grp{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.tog-btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);border-radius:16px;padding:11px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-align:center;color:rgba(255,255,255,.5);transition:all .2s}
.tog-btn.active{background:rgba(201,168,76,.18);border-color:var(--gold);color:var(--gold)}

/* MORE MENU */
.more-item{display:flex;align-items:center;gap:10px;background:rgba(10,10,15,.97);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:14px;padding:12px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:popIn .18s ease;white-space:nowrap}
@keyframes popIn{from{transform:scale(.85) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* REPORTS */
.report-row{border-radius:16px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.report-month{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff}
.report-stats{display:flex;gap:9px;font-size:10px;color:rgba(255,255,255,.45);margin-top:3px;flex-wrap:wrap}
.btn-pdf{background:rgba(201,168,76,.18);color:var(--gold);border:1px solid rgba(201,168,76,.35);border-radius:11px;padding:9px 14px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}

/* CHART */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:100px;padding:0 4px}
.chart-bar{flex:1;border-radius:6px 6px 0 0;min-height:4px;transition:height .5s ease;cursor:pointer;position:relative}
.chart-label{font-size:8px;color:rgba(255,255,255,.3);text-align:center;margin-top:4px}

/* PROGRESS BAR */
.prog-track{background:rgba(255,255,255,.07);border-radius:50px;height:9px;overflow:hidden;margin-top:7px}
.prog-fill{height:100%;border-radius:50px;transition:width .6s ease}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{padding-left:38px!important}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none}

/* TOAST */
.confirm-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#111318;border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-msg{font-size:15px;color:#fff;line-height:1.5;margin-bottom:20px;font-weight:500}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.confirm-yes{background:var(--red);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
.confirm-no{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,.95);color:#000;padding:11px 22px;border-radius:50px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(201,168,76,.35)}
.toast.show{opacity:1}

/* ANIM */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>

<div class="app">

  <nav class="bottom-nav">

  <div id="more-menu" style="position:fixed;bottom:80px;right:12px;z-index:200;display:none;flex-direction:column;gap:7px;align-items:flex-end">

    <button onclick="navigate('calcul');toggleMore()" class="more-item" id="nav-calcul"><span>Calculateur</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg></button>
    <button onclick="navigate('objectifs');toggleMore()" class="more-item" id="nav-objectifs"><span>Objectifs</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></button>
    <button onclick="navigate('notes');toggleMore()" class="more-item" id="nav-notes"><span>Notes</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
    <button onclick="navigate('conseils');toggleMore()" class="more-item" id="nav-conseils"><span>Conseils photos</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M20.188 10.934l-1.688-2.921A2 2 0 0016.77 7H7.23a2 2 0 00-1.73 1.013L3.812 10.934A2 2 0 003 12v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-.812-1.066z"/></svg></button>
    <button onclick="resetAllData();toggleMore()" class="more-item" style="border-color:rgba(248,113,113,.3);color:#f87171"><span>Tout effacer</span><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
  </div>
  <div id="more-overlay" onclick="toggleMore()" style="position:fixed;inset:0;z-index:199;display:none;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const EUR = v => parseFloat(v||0).toFixed(2).replace('.',',')+'\u00a0\u20ac';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const STOCK_ST=[{val:'En transit',label:'\ud83d\ude9a En transit',cls:'b-transit'},{val:'Re\u00e7u',label:'\ud83d\udce6 Re\u00e7u',cls:'b-recu'}];
const SALE_ST=[{val:'Envoy\u00e9',label:'\ud83d\udce4 Envoy\u00e9',cls:'b-envoye'},{val:'Paiement en attente',label:'\u23f3 En attente',cls:'b-attente'},{val:'Pay\u00e9',label:'\u2705 Pay\u00e9',cls:'b-paye'}];
const IS_SOLD = s => ['Envoy\u00e9','Paiement en attente','Pay\u00e9','Vendu'].includes(s);
const IS_PAID = s => ['Pay\u00e9','Vendu'].includes(s);
const IS_STOCK = s => ['En transit','Re\u00e7u'].includes(s);

function getBadge(status){
  const all=[...STOCK_ST,...SALE_ST];
  const s=all.find(x=>x.val===status);
  if(s) return `<span class="badge ${s.cls}">${s.label}</span>`;
  if(status==='Vendu') return `<span class="badge b-paye">\u2705 Pay\u00e9</span>`;
  return `<span class="badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">${esc(status)}</span>`;
}

let state={
  products:[],activeTab:'dashboard',stockView:'stock',selectedYear:'2026',filterBrand:'',filterColor:'',filterType:'',filterSize:'',
  editingId:null,editingType:null,conseilsSelected:null,
  calculPlatform:'Vinted',calculBuy:'',calculSell:'',
  objectifs:{},notes:[],stockSearch:'',salesSearch:''
};
const SK='alestar_v4';
function loadState(){
  try{
    const s=localStorage.getItem(SK);
    if(s){const p=JSON.parse(s);state={...state,...p};}
    state.activeTab='dashboard';state.editingId=null;state.editingType=null;
  }catch(e){}
}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
loadState();

// Produits par défaut — uniquement si stock vide
if(!state.products||state.products.length===0){
  state.products=[
    {id:1,name:'Nike tech marron',buy:16.56,source:'Vinted',date:'2026-06-01',status:'En transit',brand:'Nike tech',color:'Marron',type:'Veste',size:'S',listingUrl:''},
    {id:2,name:'Chemise rayée Lacoste',buy:13.14,source:'Vinted',date:'2026-06-01',status:'En transit',brand:'Lacoste',color:'Rayé',type:'Chemise',size:'S',listingUrl:''},
    {id:3,name:'Pull Tommy Hilfiger',buy:13.49,source:'Vinted',date:'2026-06-01',status:'En transit',brand:'Tommy Hilfiger',color:'Kaki',type:'Pull',size:'S',listingUrl:''},
    {id:4,name:'Veste Carhartt',buy:40.63,source:'Vinted',date:'2026-06-01',status:'En transit',brand:'Carhartt',color:'Bleu',type:'Veste',size:'S',listingUrl:''},
    {id:5,name:'Pull col roulé',buy:29.06,source:'Vinted',date:'2026-06-02',status:'Envoyé',brand:'Ralph Lauren',color:'Marine',type:'Pull',size:'',listingUrl:'',sell:33.00,sellPlatform:'Vinted',soldDate:'2026-06-02',margin:3.94},
  ];
  saveState();
}

function showConfirm(msg, onYes){
  const overlay=document.createElement('div');
  overlay.className='confirm-overlay';
  overlay.innerHTML=`<div class="confirm-box">
    <p class="confirm-msg">${msg}</p>
    <div class="confirm-btns">
      <button class="confirm-no" id="conf-no">Annuler</button>
      <button class="confirm-yes" id="conf-yes">Supprimer</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('conf-no').onclick=()=>overlay.remove();
  document.getElementById('conf-yes').onclick=()=>{overlay.remove();onYes();};
}

function showToast(msg,dur=2400){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function navigate(tab){
  state.activeTab=tab;state.editingId=null;state.editingType=null;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+tab);if(nb)nb.classList.add('active');
  const c=document.getElementById('content');
  c.classList.remove('fade-in');void c.offsetWidth;c.classList.add('fade-in');
  render();
}

function toggleMore(){
  const menu=document.getElementById('more-menu');
  const overlay=document.getElementById('more-overlay');
  const btn=document.getElementById('nav-more');
  const isOpen=menu.style.display==='flex';
  menu.style.display=isOpen?'none':'flex';
  overlay.style.display=isOpen?'none':'block';
  btn.classList.toggle('active',!isOpen);
}

// ── STATS ──
function getStats(){
  const sold=state.products.filter(p=>IS_SOLD(p.status));
  const paid=state.products.filter(p=>IS_PAID(p.status));
  const inStock=state.products.filter(p=>IS_STOCK(p.status));
  return {
    revenue:+paid.reduce((a,p)=>a+(p.sell||0),0).toFixed(2),
    profit:+paid.reduce((a,p)=>a+(p.margin||0),0).toFixed(2),
    purchases:+state.products.reduce((a,p)=>a+(p.buy||0),0).toFixed(2),
    stockValue:+inStock.reduce((a,p)=>a+(p.buy||0),0).toFixed(2),
    soldCount:sold.length,stockCount:inStock.length,
    transitCount:state.products.filter(p=>p.status==='En transit').length,
    recuCount:state.products.filter(p=>p.status==='Re\u00e7u').length,
    envoyeCount:state.products.filter(p=>p.status==='Envoy\u00e9').length,
    attenteCount:state.products.filter(p=>p.status==='Paiement en attente').length,
    payeCount:state.products.filter(p=>['Pay\u00e9','Vendu'].includes(p.status)).length,
  };
}

function getMonthStats(offset){
  const now=new Date();
  const t=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const m=t.getMonth(),y=t.getFullYear();
  // Only count products with status Payé or Vendu AND with a soldDate in that month
  const paye=state.products.filter(p=>{
    if(!['Pay\u00e9','Vendu'].includes(p.status)) return false;
    if(!p.soldDate) return false;
    const d=new Date(p.soldDate);
    return d.getMonth()===m && d.getFullYear()===y;
  });
  return {
    revenue:+paye.reduce((a,p)=>a+(p.sell||0),0).toFixed(2),
    profit:+paye.reduce((a,p)=>a+(p.margin||0),0).toFixed(2),
    count:paye.length,
  };
}

function trendBadge(cur,prev){
  if(prev===0&&cur===0) return '<span style="font-size:10px;color:rgba(255,255,255,.25)">Pas encore de donn\u00e9es</span>';
  if(prev===0) return '<span style="font-size:10px;color:var(--green);font-weight:700">&#128640; Nouveau ce mois</span>';
  const pct=((cur-prev)/prev*100).toFixed(1);
  const up=pct>=0;
  return `<span style="font-size:10px;color:${up?'var(--green)':'var(--red)'};font-weight:700">${up?'\u25b2':'\u25bc'} ${Math.abs(pct)}% vs mois dernier</span>`;
}

// ── ANIMATED COUNTER ──
function animateCount(el,target,isEuro,dur=1100){
  const start=performance.now();
  function step(now){
    const p=Math.min((now-start)/dur,1);
    const e=1-Math.pow(1-p,3);
    const v=target*e;
    el.textContent=isEuro?(v.toFixed(2).replace('.',',')+' \u20ac'):Math.round(v);
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function runCounters(){
  document.querySelectorAll('[data-count]').forEach(el=>{
    animateCount(el,parseFloat(el.dataset.count),el.dataset.euro==='1');
  });
}

// ── PARTICLES ──
function resetAllData(){
  showConfirm('Supprimer TOUTES les données ? Irréversible.', ()=>{
  state.products=[];
  state.notes=[];
  state.objectifs={};
  state.calculBuy='';
  state.calculSell='';
  saveState();
  showToast('🗑 Données effacées');
  render();
  });
}

function initParticles(){
  const c=document.getElementById('particles');
  if(!c) return;
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*4+2}s;animation-delay:-${Math.random()*6}s`;
    c.appendChild(p);
  }
}

// ── ACTIONS ──
function addPurchase(){
  const name=document.getElementById('p-name').value.trim();
  const buy=parseFloat(document.getElementById('p-buy').value);
  const source=document.getElementById('p-source').value;
  const status=document.getElementById('p-status').value||'Re\u00e7u';
  const date=document.getElementById('p-date').value||new Date().toISOString().split('T')[0];
  const brand=document.getElementById('p-brand').value.trim();
  const color=document.getElementById('p-color').value.trim();
  const size=(document.getElementById('p-size')||{value:''}).value.trim();
  const type=document.getElementById('p-type').value;
  if(!name||isNaN(buy)){showToast('\u26a0\ufe0f Nom et prix requis');return;}
  const listingUrl=(document.getElementById('p-listing')||{value:''}).value.trim();
  state.products.unshift({id:Date.now(),name,buy,source,date,status,brand,color,type,size,listingUrl});
  saveState();showToast('\u2705 Produit ajout\u00e9 !');render();
}

function filterSalesProduct(q){
  const sel=document.getElementById('s-product');
  if(!sel) return;
  const sf=state.saleFilter||{type:'',brand:'',color:'',size:''};
  let inStock=state.products.filter(p=>IS_STOCK(p.status));
  if(sf.type) inStock=inStock.filter(p=>p.type===sf.type);
  if(sf.brand) inStock=inStock.filter(p=>p.brand===sf.brand);
  if(sf.color) inStock=inStock.filter(p=>p.color===sf.color);
  const filtered=q?inStock.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||
    (p.brand&&p.brand.toLowerCase().includes(q.toLowerCase()))||
    (p.type&&p.type.toLowerCase().includes(q.toLowerCase()))):inStock;
  const current=sel.value;
  sel.innerHTML='<option value="">Sélectionner un produit</option>'+
    filtered.map(p=>`<option value="${p.id}" ${p.id==current?'selected':''}>${esc(p.name)}${p.brand?' — '+esc(p.brand):''}${p.type?' ('+esc(p.type)+')':''} — ${EUR(p.buy)}</option>`).join('');
}

function setSaleFilter(key,val){
  if(!state.saleFilter) state.saleFilter={type:'',brand:'',color:'',size:''};
  state.saleFilter[key]=val;
  render();
}

function addSale(){
  const pid=parseInt(document.getElementById('s-product').value);
  const sell=parseFloat(document.getElementById('s-sell').value);
  const platform=document.getElementById('s-platform').value;
  const status=document.getElementById('s-status').value||'Envoy\u00e9';
  const soldDate=document.getElementById('s-date').value||new Date().toISOString().split('T')[0];
  if(!pid||isNaN(sell)){showToast('\u26a0\ufe0f Produit et prix requis');return;}
  state.products=state.products.map(p=>{
    if(p.id===pid) return{...p,sell,sellPlatform:platform,margin:+(sell-p.buy).toFixed(2),status,soldDate};
    return p;
  });
  saveState();showToast('\ud83d\udcb8 Vente enregistr\u00e9e !');render();
}

function deleteProduct(id){
  showConfirm('Supprimer ce produit ?', ()=>{
    state.products=state.products.filter(p=>p.id!==id);
    saveState();render();
  });
}
function deleteSale(id){
  showConfirm('Supprimer cette vente ?<br>Le produit retournera en stock.',()=>{
    state.products=state.products.map(p=>{
      if(p.id===id) return{id:p.id,name:p.name,buy:p.buy,source:p.source,date:p.date,status:'Reçu',brand:p.brand,color:p.color,type:p.type,size:p.size};
      return p;
    });
    saveState();showToast('✅ Remis en stock');render();
  });
}
function editProduct(id){state.editingId=id;state.editingType='stock';render();}
function editSale(id){state.editingId=id;state.editingType='sale';render();}
function cancelEdit(){state.editingId=null;state.editingType=null;render();}

function saveEditProduct(){
  const name=document.getElementById('edit-name').value.trim();
  const buy=parseFloat(document.getElementById('edit-buy').value);
  const source=document.getElementById('edit-source').value;
  const date=document.getElementById('edit-date').value;
  const status=document.getElementById('edit-pstatus').value;
  const brand=(document.getElementById('edit-brand')||{}).value||'';
  const color=(document.getElementById('edit-color')||{}).value||'';
  const size=(document.getElementById('edit-size')||{}).value||'';
  const type=(document.getElementById('edit-type')||{}).value||'';
  if(!name||isNaN(buy)){showToast('Nom et prix requis');return;}
  const listingUrl=(document.getElementById('edit-listing')||{value:''}).value.trim();
  state.products=state.products.map(p=>p.id===state.editingId?{...p,name,buy,source,date,status,brand,color,type,size,listingUrl}:p);
  state.editingId=null;state.editingType=null;
  saveState();showToast('\u2705 Modifi\u00e9 !');render();
}
function saveEditSale(){
  const sell=parseFloat(document.getElementById('edit-sell').value);
  const platform=document.getElementById('edit-platform').value;
  const soldDate=document.getElementById('edit-solddate').value;
  const status=document.getElementById('edit-sstatus').value;
  if(isNaN(sell)){showToast('Prix requis');return;}
  state.products=state.products.map(p=>p.id===state.editingId?{...p,sell,sellPlatform:platform,soldDate,status,margin:+(sell-p.buy).toFixed(2)}:p);
  state.editingId=null;state.editingType=null;
  saveState();showToast('\u2705 Vente modifi\u00e9e !');render();
}

function updateCalculResult(){
  const platforms=[
    {name:'Vinted',fees:0,fixed:0},
    {name:'Leboncoin',fees:0,fixed:0},
    {name:'eBay',fees:0.12,fixed:0.35},
    {name:'Facebook',fees:0.05,fixed:0},
    {name:'Autre',fees:0,fixed:0},
  ];
  const pid=state.calculPlatform||'Vinted';
  const plat=platforms.find(p=>p.name===pid)||platforms[0];
  const buy=parseFloat(state.calculBuy||0);
  const sell=parseFloat(state.calculSell||0);
  const fees=sell*plat.fees+plat.fixed;
  const profit=sell-buy-fees;
  const margin=sell>0?(profit/sell*100):0;
  const pc=profit>=0?'var(--green)':'var(--red)';
  const res=document.getElementById('calcul-result');
  if(!res) return;
  res.innerHTML=`
    <div class="g2" style="gap:10px">
      <div style="text-align:center;padding:14px;background:rgba(0,0,0,.25);border-radius:14px">
        <p style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:5px">BÉNÉFICE NET</p>
        <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:26px;color:${pc}">${profit>=0?'+':''}${profit.toFixed(2).replace('.',',')} €</p>
      </div>
      <div style="text-align:center;padding:14px;background:rgba(0,0,0,.25);border-radius:14px">
        <p style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:5px">MARGE</p>
        <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:26px;color:${pc}">${margin.toFixed(1).replace('.',',')}%</p>
      </div>
      ${fees>0?`<div style="text-align:center;padding:12px;background:rgba(0,0,0,.25);border-radius:14px;grid-column:1/-1"><p style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:4px">FRAIS PLATEFORME</p><p style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--red)">-${fees.toFixed(2).replace('.',',')} €</p></div>`:''}
    </div>`;
}

function updateObjectifBars(){
  const now=new Date();
  const cur=getMonthStats(0);
  const obj=state.objectifs||{};
  const ventesCur=state.products.filter(p=>{
    if(!['Pay\u00e9','Vendu'].includes(p.status)||!p.soldDate) return false;
    const d=new Date(p.soldDate);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;

  function updateBar(id, val, target, color){
    const el=document.getElementById(id);
    if(!el) return;
    const pct=target>0?Math.min(val/target*100,100):0;
    el.innerHTML=`<div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
      <p style="font-size:10px;color:rgba(255,255,255,.25);margin-top:3px">${pct.toFixed(0)}% de l\u2019objectif</p>`;
  }

  updateBar('bar-ca', cur.revenue, parseFloat(obj.ca||0), 'linear-gradient(90deg,var(--gold),var(--gold2))');
  updateBar('bar-profit', cur.profit, parseFloat(obj.profit||0), 'linear-gradient(90deg,var(--green),#86efac)');
  updateBar('bar-ventes', ventesCur, parseInt(obj.ventes||0), 'linear-gradient(90deg,var(--blue),#93c5fd)');
}

function setSearch(type,val){

  const inStock=state.products.filter(p=>IS_STOCK(p.status));
  const sold=state.products.filter(p=>IS_SOLD(p.status));
  const q=state.stockSearch||'';
  const qs=state.salesSearch||'';
  if(type==='stock'){
    const filt=q?inStock.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())):inStock;

    if(container) container.innerHTML=filt.length?filt.map(p=>stockRowHTML(p)).join(''):'<p class="empty">Aucun r\u00e9sultat</p>';

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=function(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const imported=JSON.parse(ev.target.result);
        if(imported.products){
          state={...state,...imported};
          saveState();
          showToast('✅ Données importées !');
          render();
        } else {
          showToast('⚠️ Fichier invalide');
        }
      }catch(e){showToast('⚠️ Erreur import');}
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportCSV(){
  const headers=['Nom','Achat (EUR)','Vente (EUR)','Marge (EUR)','Statut','Source','Plateforme','Date achat','Date vente'];
  const rows=state.products.map(p=>[
    p.name||'',p.buy||'',p.sell||'',p.margin||'',
    p.status||'',p.source||'',p.sellPlatform||'',
    p.date||'',p.soldDate||''
  ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';'));
  const csv='﻿'+headers.join(';')+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ALESTAR-export-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  showToast('\ud83d\udcca Export CSV t\u00e9l\u00e9charg\u00e9 !');
}

function downloadReport(month,dataJson){
  const data=JSON.parse(dataJson);
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    doc.setFillColor(10,10,10);doc.rect(0,0,210,42,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(20);doc.setFont('helvetica','bold');
    doc.text('ALESTAR RESELL',20,18);
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text('Rapport — '+month+' '+state.selectedYear,20,30);
    doc.setTextColor(10,10,10);doc.setFillColor(248,248,248);
    doc.roundedRect(10,50,190,52,4,4,'F');
    doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text("CA :",20,62);doc.text('Benefices :',20,74);doc.text('Achats :',20,86);doc.text('Ventes :',20,98);
    doc.setFont('helvetica','normal');
    doc.text(String(data.revenue).replace('.',',')+' EUR',80,62);
    doc.text(String(data.profit).replace('.',',')+' EUR',80,74);
    doc.text(String(data.purchases).replace('.',',')+' EUR',80,86);
    doc.text(String(data.salesCount),80,98);
    if(data.lines&&data.lines.length){
      doc.setFillColor(10,10,10);doc.rect(10,112,190,8,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text('Produit',14,117);doc.text('Achat',105,117);doc.text('Vente',140,117);doc.text('Marge',172,117);
      doc.setTextColor(10,10,10);doc.setFont('helvetica','normal');
      let y=129;
      data.lines.forEach((line,i)=>{
        if(i%2===0){doc.setFillColor(250,250,250);doc.rect(10,y-6,190,9,'F');}
        const p=line.split('|');
        doc.text((p[0]||'').trim().substring(0,28),14,y);
        doc.text((p[1]||'').replace('Achat ',''),105,y);
        doc.text((p[2]||'').replace('Vente ',''),140,y);
        doc.text((p[3]||'').replace('Marge ',''),172,y);
        y+=10;if(y>275){doc.addPage();y=20;}
      });
    }
    doc.setFontSize(8);doc.setTextColor(160,160,160);
    doc.text('ALESTAR Resell — '+new Date().toLocaleDateString('fr-FR'),20,285);
    doc.save('ALESTAR-'+month+'-'+state.selectedYear+'.pdf');
    showToast('\ud83d\udcc4 PDF t\u00e9l\u00e9charg\u00e9 !');
  }catch(e){showToast('Erreur PDF');}
}

// ── RENDER STOCK ──
function renderStock(){
  const s=getStats();
  const allInStock=state.products.filter(p=>IS_STOCK(p.status));
  const allSold=state.products.filter(p=>IS_SOLD(p.status));
  const q=state.stockSearch||'';
  const qs=state.salesSearch||'';
  const fb=state.filterBrand||'';
  const fc=state.filterColor||'';
  const ft=state.filterType||'';
  const fs=state.filterSize||'';
  const allBrands=[...new Set(state.products.map(p=>p.brand).filter(Boolean))].sort();
  const allColors=[...new Set(state.products.map(p=>p.color).filter(Boolean))].sort();
  const allTypes=[...new Set(state.products.map(p=>p.type).filter(Boolean))].sort();
  const allSizes=[...new Set(state.products.map(p=>p.size).filter(Boolean))].sort((a,b)=>{
    const order=['XXS','XS','S','M','L','XL','XXL','XXXL'];
    const ai=order.indexOf(a.toUpperCase()),bi=order.indexOf(b.toUpperCase());
    if(ai!==-1&&bi!==-1) return ai-bi;
    if(ai!==-1) return -1; if(bi!==-1) return 1;
    return a.localeCompare(b);
  });

  // Apply filters
  let inStock=allInStock;
  let sold=allSold;
  if(fb){inStock=inStock.filter(p=>p.brand===fb);sold=sold.filter(p=>p.brand===fb);}
  if(fc){inStock=inStock.filter(p=>p.color===fc);sold=sold.filter(p=>p.color===fc);}
  if(fs){inStock=inStock.filter(p=>p.size===fs);sold=sold.filter(p=>p.size===fs);}
  if(ft){inStock=inStock.filter(p=>p.type===ft);sold=sold.filter(p=>p.type===ft);}
  const filtStock=q?inStock.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())):inStock;
  const filtSold=qs?sold.filter(p=>p.name.toLowerCase().includes(qs.toLowerCase())):sold;
  const eId=state.editingType==='stock'?state.editingId:null;
  const esId=state.editingType==='sale'?state.editingId:null;

  const hasFilters=fb||fc||ft||fs;
  const filtersHTML='';

  const stockRows=filtStock.length?filtStock.map(p=>stockRowHTML(p)).join(''):'<p class="empty">Aucun r\u00e9sultat</p>';
  const saleRows=filtSold.length?filtSold.map(p=>saleRowHTML(p)).join(''):'<p class="empty">Aucun r\u00e9sultat</p>';

  return `<h1 class="page-title">&#128230; Stock</h1>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px">
    <div class="stat glass"><p class="stat-label">Valeur</p><p class="stat-value" style="font-size:16px">${EUR(s.stockValue)}</p></div>
    <div class="stat glass"><p class="stat-label">En stock</p><p class="stat-value" style="font-size:16px">${s.stockCount}</p></div>
    <div class="stat glass"><p class="stat-label">Vendus</p><p class="stat-value" style="font-size:16px">${s.soldCount}</p></div>
  </div>
  <div class="tog-grp">
    <button class="tog-btn ${state.stockView==='stock'?'active':''}" onclick="setStockView('stock')">&#128230; Inventaire</button>
    <button class="tog-btn ${state.stockView==='sales'?'active':''}" onclick="setStockView('sales')">&#128184; Ventes</button>
  </div>
  ${filtersHTML}
  <div class="search-wrap" style="margin-bottom:8px">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="input search-input" type="text" placeholder="Rechercher un produit..."
      value="${esc(state.stockView==='stock'?q:qs)}"
      oninput="setSearch('${state.stockView}',this.value)"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:${hasFilters?'6px':'12px'}">
    <select class="input" style="padding:9px 10px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;border-color:${ft?'var(--gold)':'rgba(255,255,255,.12)'};color:${ft?'var(--gold)':'rgba(255,255,255,.4)'}"
      onchange="setFilter('type',this.value)">
      <option value="">&#128085; Type</option>
      ${allTypes.map(t=>`<option value="${esc(t)}" ${ft===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select>
    <select class="input" style="padding:9px 10px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;border-color:${fb?'var(--gold)':'rgba(255,255,255,.12)'};color:${fb?'var(--gold)':'rgba(255,255,255,.4)'}"
      onchange="setFilter('brand',this.value)">
      <option value="">&#11088; Marque</option>
      ${allBrands.map(b=>`<option value="${esc(b)}" ${fb===b?'selected':''}>${esc(b)}</option>`).join('')}
    </select>
    <select class="input" style="padding:9px 10px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;border-color:${fc?'var(--gold)':'rgba(255,255,255,.12)'};color:${fc?'var(--gold)':'rgba(255,255,255,.4)'}"
      onchange="setFilter('color',this.value)">
      <option value="">&#127912; Couleur</option>
      ${allColors.map(c=>`<option value="${esc(c)}" ${fc===c?'selected':''}>${esc(c)}</option>`).join('')}
    </select>
    <select class="input" style="padding:9px 10px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;border-color:${fs?'var(--gold)':'rgba(255,255,255,.12)'};color:${fs?'var(--gold)':'rgba(255,255,255,.4)'}"
      onchange="setFilter('size',this.value)">
      <option value="">&#128207; Taille</option>
      ${allSizes.map(s=>`<option value="${esc(s)}" ${fs===s?'selected':''}>${esc(s)}</option>`).join('')}
    </select>
  </div>
  ${hasFilters?`<div style="margin-bottom:10px"><button onclick="clearFilters()" style="font-size:11px;color:var(--red);background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:50px;padding:5px 12px;cursor:pointer;font-weight:700">&#10005; Effacer les filtres</button></div>`:''}
  <div class="glass" style="padding:14px">
    <p class="section-title">${state.stockView==='stock'?'&#128230; Inventaire actuel':'&#128184; Historique des ventes'}</p>
    <div id="${state.stockView==='stock'?'stock-rows':'sale-rows'}">${state.stockView==='stock'?stockRows:saleRows}</div>
  </div>`;
}

function setSaleFilter(key,val){
  if(!state.saleFilter) state.saleFilter={type:'',brand:'',color:'',size:''};
  if(key==='clear'){state.saleFilter={type:'',brand:'',color:'',size:''};}
  else state.saleFilter[key]=val;
  render();
}

function renderStats(){
  const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
  const now=new Date();
  const data=months.map((m,i)=>{
    const paid=state.products.filter(p=>{
      if(!IS_PAID(p.status)||!p.soldDate) return false;
      const d=new Date(p.soldDate);
      return d.getMonth()===i&&d.getFullYear()===now.getFullYear();
    });
    const bought=state.products.filter(p=>{
      if(!p.date) return false;
      const d=new Date(p.date);
      return d.getMonth()===i&&d.getFullYear()===now.getFullYear();
    });
    return{
      month:m,
      revenue:+paid.reduce((a,p)=>a+(p.sell||0),0).toFixed(2),
      profit:+paid.reduce((a,p)=>a+(p.margin||0),0).toFixed(2),
      purchases:+bought.reduce((a,p)=>a+(p.buy||0),0).toFixed(2),
    };
  });

  function buildChart(dataKey,color,labelColor){
    const vals=data.map(d=>d[dataKey]);
    const maxVal=Math.max(...vals,1);
    return data.map((d,i)=>{
      const v=d[dataKey];
      const h=Math.max(v/maxVal*80,v>0?4:1);
      const active=i===now.getMonth();
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0">
        ${active&&v>0?`<p style="font-size:7px;color:${labelColor};font-weight:800;margin-bottom:2px;white-space:nowrap">${v.toFixed(0)}€</p>`:'<p style="font-size:7px;margin-bottom:2px">&nbsp;</p>'}
        <div style="width:100%;background:${active?color:'rgba(255,255,255,.12)'};border-radius:3px 3px 0 0;height:${h}px;min-height:1px;transition:height .4s"></div>
        <p style="font-size:7px;color:${active?labelColor:'rgba(255,255,255,.3)'};font-weight:${active?700:400};margin-top:3px">${d.month}</p>
      </div>`;
    }).join('');
  }

  // Mois en cours uniquement pour les cartes du haut
  const curMonth=now.getMonth();
  const totRev=data[curMonth].revenue;
  const totProfit=data[curMonth].profit;
  const totPurchases=data[curMonth].purchases;
  const monthName=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][curMonth];

  const platCounts={};
  state.products.filter(p=>IS_PAID(p.status)&&p.sellPlatform).forEach(p=>{
    platCounts[p.sellPlatform]=(platCounts[p.sellPlatform]||0)+1;
  });
  const bestPlat=Object.entries(platCounts).sort((a,b)=>b[1]-a[1])[0];
  const bestProduct=state.products.filter(p=>IS_PAID(p.status)&&p.margin>0).sort((a,b)=>b.margin-a.margin)[0];

  return `<h1 class="page-title">&#128202; Statistiques</h1>

  <div class="g3 mb4">
    <div style="grid-column:1/-1;text-align:center;margin-bottom:2px">
      <span style="font-size:10px;color:rgba(255,255,255,.35);font-weight:600">${monthName} ${now.getFullYear()}</span>
    </div>
    <div class="glass" style="padding:12px;text-align:center;border-color:rgba(201,168,76,.25)">
      <p style="font-size:9px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">CA</p>
      <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:15px;color:var(--gold)">${EUR(totRev)}</p>
    </div>
    <div class="glass" style="padding:12px;text-align:center;border-color:rgba(74,222,128,.25)">
      <p style="font-size:9px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Bénéf</p>
      <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:15px;color:#4ade80">+${EUR(totProfit)}</p>
    </div>
    <div class="glass" style="padding:12px;text-align:center;border-color:rgba(248,113,113,.25)">
      <p style="font-size:9px;color:#f87171;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Achats</p>
      <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:15px;color:#f87171">${EUR(totPurchases)}</p>
    </div>
  </div>

  <div class="glass" style="padding:14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p class="section-title" style="margin-bottom:0;color:var(--gold)">&#128200; Chiffre d'affaires</p>
      <span style="font-size:10px;color:rgba(255,255,255,.3)">${now.getFullYear()}</span>
    </div>
    <div style="display:flex;align-items:flex-end;gap:2px;height:95px">${buildChart('revenue','linear-gradient(180deg,#C9A84C,#8a5a10)','#C9A84C')}</div>
  </div>

  <div class="glass" style="padding:14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p class="section-title" style="margin-bottom:0;color:#4ade80">&#128200; Bénéfices</p>
      <span style="font-size:10px;color:rgba(255,255,255,.3)">${now.getFullYear()}</span>
    </div>
    <div style="display:flex;align-items:flex-end;gap:2px;height:95px">${buildChart('profit','linear-gradient(180deg,#4ade80,#15803d)','#4ade80')}</div>
  </div>

  <div class="glass" style="padding:14px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p class="section-title" style="margin-bottom:0;color:#f87171">&#128200; Dépenses / Achats</p>

function renderReports(){
  const months=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  const years=['2024','2025','2026','2027','2028','2029','2030'];
  const rows=months.map((month,idx)=>{
    const mSales=state.products.filter(p=>{
      if(!IS_PAID(p.status)||!p.soldDate) return false;
      const d=new Date(p.soldDate);
      return d.getMonth()===idx&&String(d.getFullYear())===state.selectedYear;
    });
    const mPurchases=state.products.filter(p=>{
      if(!p.date) return false;
      const d=new Date(p.date);
      return d.getMonth()===idx&&String(d.getFullYear())===state.selectedYear;
    });
    const revenue=+mSales.reduce((a,p)=>a+(p.sell||0),0).toFixed(2);
    const profit=+mSales.reduce((a,p)=>a+(p.margin||0),0).toFixed(2);
    const purchases=+mPurchases.reduce((a,p)=>a+(p.buy||0),0).toFixed(2);
    const lines=mSales.map(p=>`${p.name}|Achat ${p.buy}|Vente ${p.sell}|Marge ${p.margin}`);
    const dj=JSON.stringify(JSON.stringify({revenue,profit,purchases,salesCount:mSales.length,lines}));
    return `<div class="report-row glass">
      <div><p class="report-month">${month}</p>
      <div class="report-stats"><span>&#128176; ${EUR(revenue)}</span><span>&#128200; ${EUR(profit)}</span><span>&#128722; ${EUR(purchases)}</span></div></div>
      <button class="btn-pdf" onclick='downloadReport("${month}",${dj})'>PDF</button>
    </div>`;
  }).join('');
  const yearOpts=years.map(y=>`<option ${y===state.selectedYear?'selected':''}>${y}</option>`).join('');
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <h1 class="page-title" style="margin-bottom:0">&#129518; Rapports</h1>
    <select class="input" style="width:auto;padding:8px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px" onchange="setYear(this.value)">${yearOpts}</select>
  </div>
  <div>${rows}</div>`;
}

// ── RENDER CALCUL ──
function renderCalcul(){
  const platforms=[
    {name:'Vinted',fees:0,fixed:0,desc:'Frais vendeur : 0\u20ac (pay\u00e9s par l\u2019acheteur)'},
    {name:'Leboncoin',fees:0,fixed:0,desc:'Frais vendeur : 0\u20ac (vente directe)'},
    {name:'eBay',fees:0.12,fixed:0.35,desc:'Frais vendeur : 12% + 0,35\u20ac'},
    {name:'Facebook',fees:0.05,fixed:0,desc:'Frais vendeur : 5%'},
    {name:'Autre',fees:0,fixed:0,desc:'Sans frais'},
  ];
  const pid=state.calculPlatform||'Vinted';
  const plat=platforms.find(p=>p.name===pid)||platforms[0];
  const buy=parseFloat(state.calculBuy||0);
  const sell=parseFloat(state.calculSell||0);
  const fees=sell*plat.fees+plat.fixed;
  const profit=sell-buy-fees;
  const margin=sell>0?(profit/sell*100):0;
  const pc=profit>=0?'var(--green)':'var(--red)';
  const platBtns=platforms.map(p=>`<button onclick="setCalcul('platform','${p.name}')" style="padding:7px 12px;border-radius:11px;border:1.5px solid ${pid===p.name?'var(--gold)':'rgba(255,255,255,.1)'};background:${pid===p.name?'rgba(201,168,76,.18)':'rgba(255,255,255,.03)'};color:${pid===p.name?'var(--gold)':'rgba(255,255,255,.45)'};font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer">${p.name}</button>`).join('');
  return `<h1 class="page-title">&#128201; Calculateur</h1>
  <div class="glass" style="padding:18px;margin-bottom:12px">
    <p class="section-title">Plateforme</p>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">${platBtns}</div>
    <p style="font-size:10px;color:rgba(255,255,255,.3);margin-top:5px">${plat.desc}</p>
  </div>
  <div class="glass" style="padding:18px;margin-bottom:12px">
    <p class="section-title">Tes prix</p>
    <div class="sy">
      <div><p style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:5px">Prix d\u2019achat (\u20ac)</p>
      <input class="input" type="number" step="0.01" placeholder="Ex: 8,00" value="${state.calculBuy||''}" oninput="setCalcul('buy',this.value)"/></div>
      <div><p style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:5px">Prix de vente vis\u00e9 (\u20ac)</p>
      <input class="input" type="number" step="0.01" placeholder="Ex: 25,00" value="${state.calculSell||''}" oninput="setCalcul('sell',this.value)"/></div>
    </div>
  </div>
  <div style="background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.25);border-radius:22px;padding:18px">
    <p class="section-title" style="color:var(--gold)">R\u00e9sultat</p>
    <div id="calcul-result">
    <div class="g2" style="gap:10px">
      <div style="text-align:center;padding:14px;background:rgba(0,0,0,.25);border-radius:14px">
        <p style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:5px">B\u00c9N\u00c9FICE NET</p>
        <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:26px;color:${pc}">${profit>=0?'+':''}${profit.toFixed(2).replace('.',',')} \u20ac</p>
      </div>
      <div style="text-align:center;padding:14px;background:rgba(0,0,0,.25);border-radius:14px">
        <p style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:5px">MARGE</p>
        <p style="font-family:'Syne',sans-serif;font-weight:900;font-size:26px;color:${pc}">${margin.toFixed(1).replace('.',',')}%</p>
      </div>
      ${fees>0?`<div style="text-align:center;padding:12px;background:rgba(0,0,0,.25);border-radius:14px;grid-column:1/-1"><p style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:4px">FRAIS PLATEFORME</p><p style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--red)">-${fees.toFixed(2).replace('.',',')} \u20ac</p></div>`:''}
    </div>
    </div>
  </div>`;
}

function renderObjectifs(){

  const sel=state.conseilsSelected;

      +'<span style="font-size:9px;font-weight:700;color:'+(sel===v.id?'var(--gold)':'rgba(255,255,255,.45)')+';font-family:\'Syne\',sans-serif;text-align:center;line-height:1.2">'+v.label+'</span>'
      +'</button>';
  }).join('');

  var detail='';
  if(sel&&photos[sel]){
    var ps=photos[sel];
    var vet=vetements.find(function(v){return v.id===sel;});
    var grid=ps.map(function(p,i){
      return '<div class="glass" style="padding:12px">'

function render(){
  const c=document.getElementById('content');
  switch(state.activeTab){
    case 'dashboard': c.innerHTML=renderDashboard(); setTimeout(runCounters,60); break;
    case 'stock':     c.innerHTML=renderStock(); break;
    case 'purchases': c.innerHTML=renderPurchases(); break;
    case 'sales':     c.innerHTML=renderSales(); break;
    case 'stats':     c.innerHTML=renderStats(); break;
    case 'rapports':  c.innerHTML=renderReports(); break;
    case 'calcul':    c.innerHTML=renderCalcul(); break;
    case 'objectifs': c.innerHTML=renderObjectifs(); break;
    case 'notes':     c.innerHTML=renderNotes(); break;
    case 'conseils':  c.innerHTML=renderConseils(); break;
    default: c.innerHTML=renderDashboard(); setTimeout(runCounters,60);
  }
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+state.activeTab);if(nb)nb.classList.add('active');
}

initParticles();
render();
